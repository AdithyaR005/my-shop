<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Adithya Shop - Shopping Cart</title>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html">← Back to Shop</a>
            <h1>🛒 Shopping Cart</h1>
        </div>
    </header>

    <main>
        <section class="cart-section">
            <div id="cart-items" class="cart-items">
                <!-- Cart items will load here -->
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <p>Subtotal: <span id="subtotal">₹0</span></p>
                <p>Tax (0%): <span id="tax">₹0</span></p>
                <h2>Total: <span id="total">₹0</span></h2>
                <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Adithya Shop</p>
    </footer>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script>
        function renderCart() {
            const cartItems = document.getElementById('cart-items');
            const cart = getCart();

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="empty-cart">Your cart is empty. <a href="index.html">Continue Shopping</a></p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>₹${item.price} each</p>
                        </div>
                        <div class="item-quantity">
                            <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            <input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${item.id}, this.value)">
                            <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                        <div class="item-total">
                            <p>₹${item.price * item.quantity}</p>
                            <button class="remove-btn" onclick="removeFromCart(${item.id}); renderCart();">Remove</button>
                        </div>
                    </div>
                `).join('');
            }
            updateSummary();
        }

        function updateSummary() {
            const total = getCartTotal();
            document.getElementById('subtotal').textContent = '₹' + total;
            document.getElementById('tax').textContent = '₹0';
            document.getElementById('total').textContent = '₹' + total;
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
