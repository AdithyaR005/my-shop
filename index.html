<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Adithya Shop - Home</title>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>🛍️ Adithya Shop</h1>
            <a href="cart.html" class="cart-link">
                🛒 Cart <span id="cart-count" class="cart-badge">0</span>
            </a>
        </div>
        <nav>
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="sun-direct">☀️ Sun Direct</button>
            <button class="filter-btn" data-category="dishes">🍽️ Dishes</button>
            <button class="filter-btn" data-category="tv-recharge">📺 TV Recharge</button>
        </nav>
    </header>

    <main>
        <section id="products" class="products-section">
            <h2>Our Products</h2>
            <div id="product-list" class="product-grid">
                <!-- Products will load here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Adithya Shop. All rights reserved.</p>
    </footer>

    <script src="product.js"></script>
    <script src="cart.js"></script>
</body>
</html>
